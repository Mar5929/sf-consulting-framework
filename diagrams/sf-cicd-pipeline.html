<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CI/CD Pipeline — Salesforce Framework</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .env-card { cursor: pointer; transition: filter .15s; }
    .env-card:hover { filter: brightness(1.2); }
    .gate-label {
      font-family: var(--font-mono);
      font-size: 11px;
      fill: var(--text-dim);
      text-anchor: middle;
    }
    .env-title {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      fill: var(--text);
      text-anchor: middle;
    }
    .env-desc {
      font-family: var(--font-ui);
      font-size: 10px;
      fill: var(--text-dim);
      text-anchor: middle;
    }
    .arrow-line {
      stroke: #64748B;
      stroke-width: 2;
      fill: none;
    }
    .arrow-head {
      fill: #64748B;
    }
    .sidebar .sb-detail-row {
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
    }
    .sidebar .sb-detail-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 4px;
    }
    .sidebar .sb-detail-value {
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="btn-reset">Reset Zoom</button>
  </div>

  <div class="title-bar">
    <h1>CI/CD Pipeline</h1>
    <div class="subtitle">Salesforce Deployment Pipeline — Scratch Org to Production</div>
  </div>

  <a class="back-link" href="index.html">&larr; All Diagrams</a>

  <svg class="diagram" id="svg"></svg>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="shared.js"></script>
  <script src="data/sf-cicd-pipeline-data.js"></script>
  <script>
  (() => {
    const { environments, gates } = SfCicdPipelineData;
    const width = window.innerWidth;
    const height = window.innerHeight;

    const svg = d3.select('#svg');
    const g = svg.append('g');

    // Zoom
    const zoom = Shared.setupZoom(svg, g);
    svg.call(zoom.transform, d3.zoomIdentity.translate(width * 0.08, height / 2 - 90).scale(0.85));
    document.getElementById('btn-reset').onclick = () => {
      svg.transition().duration(500)
        .call(zoom.transform, d3.zoomIdentity.translate(width * 0.08, height / 2 - 90).scale(0.85));
    };

    // Tooltip & Sidebar
    const tooltip = Shared.createTooltip();

    // Custom sidebar for pipeline
    const sidebarEl = document.createElement('div');
    sidebarEl.className = 'sidebar';
    sidebarEl.innerHTML = `
      <button class="sidebar-close">&times;</button>
      <h2 class="sb-name"></h2>
      <div class="sb-category"></div>
      <div class="sb-desc"></div>
      <div class="sb-details"></div>
    `;
    document.body.appendChild(sidebarEl);
    sidebarEl.querySelector('.sidebar-close').onclick = () => sidebarEl.classList.remove('open');

    function showSidebar(env) {
      sidebarEl.querySelector('.sb-name').textContent = env.name;
      sidebarEl.querySelector('.sb-category').textContent = env.id;
      sidebarEl.querySelector('.sb-desc').textContent = env.description;
      const details = sidebarEl.querySelector('.sb-details');
      details.innerHTML = `
        <div class="sb-detail-row">
          <span class="sb-detail-label">Deployment Method</span>
          <span class="sb-detail-value">${env.deploymentMethod}</span>
        </div>
        <div class="sb-detail-row">
          <span class="sb-detail-label">Approver</span>
          <span class="sb-detail-value">${env.approver}</span>
        </div>
        <div class="sb-detail-row">
          <span class="sb-detail-label">Test Requirements</span>
          <span class="sb-detail-value">${env.testRequirements}</span>
        </div>
        <div class="sb-detail-row">
          <span class="sb-detail-label">Rollback Strategy</span>
          <span class="sb-detail-value">${env.rollbackStrategy}</span>
        </div>
      `;
      sidebarEl.classList.add('open');
    }

    // Layout constants
    const cardW = 140;
    const cardH = 180;
    const gapX = 80;
    const headerH = 8;
    const startX = 40;
    const startY = 0;

    // Arrow marker
    svg.append('defs').append('marker')
      .attr('id', 'arrowhead')
      .attr('viewBox', '0 0 10 8')
      .attr('refX', 10).attr('refY', 4)
      .attr('markerWidth', 10).attr('markerHeight', 8)
      .attr('orient', 'auto')
      .append('path')
      .attr('d', 'M0,0 L10,4 L0,8 Z')
      .attr('class', 'arrow-head');

    // Draw connecting arrows first (behind cards)
    gates.forEach((gate, i) => {
      const x1 = startX + i * (cardW + gapX) + cardW;
      const x2 = startX + (i + 1) * (cardW + gapX);
      const y = startY + cardH / 2;

      // Arrow line
      g.append('line')
        .attr('class', 'arrow-line')
        .attr('x1', x1).attr('y1', y)
        .attr('x2', x2 - 4).attr('y2', y)
        .attr('marker-end', 'url(#arrowhead)');

      // Gate label
      g.append('text')
        .attr('class', 'gate-label')
        .attr('x', (x1 + x2) / 2)
        .attr('y', y - 12)
        .text(gate.label);
    });

    // Draw environment cards
    environments.forEach((env, i) => {
      const x = startX + i * (cardW + gapX);
      const y = startY;

      const card = g.append('g')
        .attr('class', 'env-card')
        .attr('transform', `translate(${x}, ${y})`);

      // Card background
      card.append('rect')
        .attr('width', cardW).attr('height', cardH)
        .attr('rx', 10).attr('ry', 10)
        .attr('fill', '#1E293B')
        .attr('stroke', env.color)
        .attr('stroke-width', 1.5);

      // Colored header bar
      card.append('rect')
        .attr('width', cardW).attr('height', headerH)
        .attr('rx', 10).attr('ry', 10)
        .attr('fill', env.color);

      // Cover bottom corners of header
      card.append('rect')
        .attr('y', headerH / 2)
        .attr('width', cardW).attr('height', headerH / 2)
        .attr('fill', env.color);

      // Step number circle
      card.append('circle')
        .attr('cx', cardW / 2).attr('cy', 36)
        .attr('r', 16)
        .attr('fill', env.color)
        .attr('opacity', 0.2);

      card.append('text')
        .attr('x', cardW / 2).attr('y', 40)
        .attr('text-anchor', 'middle')
        .attr('font-size', '14px')
        .attr('font-weight', '700')
        .attr('fill', env.color)
        .text(i + 1);

      // Title
      card.append('text')
        .attr('class', 'env-title')
        .attr('x', cardW / 2).attr('y', 68)
        .text(env.name);

      // Description (wrapped)
      const words = env.description.split(' ');
      let line = '';
      let lineNum = 0;
      const maxLineW = 16; // chars per line approx
      words.forEach(word => {
        if ((line + ' ' + word).trim().length > maxLineW && line) {
          card.append('text')
            .attr('class', 'env-desc')
            .attr('x', cardW / 2).attr('y', 90 + lineNum * 14)
            .text(line.trim());
          lineNum++;
          line = word;
        } else {
          line = (line + ' ' + word).trim();
        }
      });
      if (line) {
        card.append('text')
          .attr('class', 'env-desc')
          .attr('x', cardW / 2).attr('y', 90 + lineNum * 14)
          .text(line.trim());
      }

      // Approver tag at bottom
      card.append('text')
        .attr('x', cardW / 2).attr('y', cardH - 16)
        .attr('text-anchor', 'middle')
        .attr('font-family', 'var(--font-mono)')
        .attr('font-size', '9px')
        .attr('fill', env.color)
        .text(env.approver);

      // Interactions
      card.on('mouseover', (event) => {
        tooltip.show(env, event);
      });
      card.on('mousemove', (event) => {
        tooltip.show(env, event);
      });
      card.on('mouseout', () => tooltip.hide());
      card.on('click', () => showSidebar(env));
    });

    // Close sidebar on background click
    svg.on('click', (e) => {
      if (e.target === svg.node()) {
        sidebarEl.classList.remove('open');
      }
    });
  })();
  </script>
</body>
</html>
