<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Project Lifecycle — Claude Toolkit</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .lc-edge {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .lc-edge-back {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 10 6;
      animation: pulse-flow .8s linear infinite;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="btn-reset">Reset Zoom</button>
  </div>

  <div class="title-bar">
    <h1>SF Project Lifecycle</h1>
    <div class="subtitle">Discovery to Managed Services — Salesforce Implementation Flow</div>
  </div>

  <a class="back-link" href="index.html">&larr; All Diagrams</a>

  <svg class="diagram" id="svg"></svg>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="shared.js"></script>
  <script src="data/sf-lifecycle-data.js"></script>
  <script>
  (() => {
    const { phases, nodes, edges, toolMap } = SFLifecycleData;
    const width = window.innerWidth;
    const height = window.innerHeight;

    const svg = d3.select('#svg');
    const g = svg.append('g');

    const zoom = Shared.setupZoom(svg, g);
    svg.call(zoom.transform, d3.zoomIdentity.translate(80, height / 2 - 200).scale(0.52));
    document.getElementById('btn-reset').onclick = () => {
      svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(80, height / 2 - 200).scale(0.52));
    };

    const tooltip = Shared.createTooltip();
    const sidebar = Shared.createSidebar();

    // ── Layout constants ──
    const stepW = 140;
    const stepH = 56;
    const gapX = 180;
    const laneH = 130;
    const laneGap = 10;
    const startX = 140;
    const startY = 80;

    // ── Phase → Y mapping ──
    const phaseY = {};
    phases.forEach((p, i) => {
      phaseY[p.id] = startY + i * (laneH + laneGap);
    });

    // ── Assign positions ──
    // Each phase has its own x-offset counter starting from 0
    const phaseXOffset = {};
    phases.forEach(p => { phaseXOffset[p.id] = 0; });

    // Count nodes per phase to compute per-phase x slots
    const phaseNodes = {};
    phases.forEach(p => { phaseNodes[p.id] = []; });
    nodes.forEach(n => { phaseNodes[n.phase].push(n); });

    // Sort by x within each phase, then assign px
    Object.values(phaseNodes).forEach(pnodes => {
      pnodes.sort((a, b) => a.x - b.x);
      pnodes.forEach((n, i) => {
        n.localX = i;
        n.px = startX + i * gapX;
        n.py = phaseY[n.phase] + laneH / 2;
      });
    });

    // Compute max lane width
    const maxNodesInPhase = Math.max(...Object.values(phaseNodes).map(p => p.length));
    const totalW = maxNodesInPhase * gapX + 100;

    // ── Swim Lanes ──
    const laneX = startX - stepW / 2 - 30;
    phases.forEach((p) => {
      const y = phaseY[p.id];
      g.append('rect')
        .attr('class', 'swim-lane')
        .attr('x', laneX)
        .attr('y', y)
        .attr('width', totalW)
        .attr('height', laneH)
        .attr('fill', d3.color(p.color).copy({opacity: 0.04}));

      g.append('text')
        .attr('class', 'phase-label')
        .attr('x', laneX + 10)
        .attr('y', y + 20)
        .attr('fill', p.color)
        .text(p.label);
    });

    // ── Arrow markers ──
    const defs = svg.append('defs');
    Shared.createArrowMarker(defs, 'arrow', '#7DD3FC', { refX: 10, size: 9 });
    Shared.createArrowMarker(defs, 'arrow-back', '#FACC15', { refX: 10, size: 9 });

    // ── Edges ──
    const nodeMap = {};
    nodes.forEach(n => { nodeMap[n.id] = n; });

    const dTip = 30 * Math.SQRT2;
    function getAnchor(node, side) {
      const isDiamond = node.shape === 'diamond';
      switch (side) {
        case 'right':  return { x: node.px + (isDiamond ? dTip : stepW / 2), y: node.py };
        case 'left':   return { x: node.px - (isDiamond ? dTip : stepW / 2), y: node.py };
        case 'top':    return { x: node.px, y: node.py - (isDiamond ? dTip : stepH / 2) };
        case 'bottom': return { x: node.px, y: node.py + (isDiamond ? dTip : stepH / 2) };
      }
    }

    const edgeG = g.append('g');
    edges.forEach(e => {
      const s = nodeMap[e.source];
      const t = nodeMap[e.target];
      if (!s || !t) return;

      const samePhase = s.phase === t.phase;
      const isBack = samePhase && t.px < s.px;
      const isCrossPhase = !samePhase;

      const path = edgeG.append('path')
        .attr('class', isBack ? 'lc-edge-back' : 'lc-edge')
        .attr('stroke', isBack ? '#FACC15' : '#7DD3FC')
        .attr('stroke-width', isBack ? 2.5 : 2)
        .attr('opacity', isBack ? 0.9 : 0.8)
        .attr('marker-end', isBack ? 'url(#arrow-back)' : 'url(#arrow)');

      let labelX, labelY;

      if (isBack) {
        const src = getAnchor(s, 'bottom');
        const tgt = getAnchor(t, 'bottom');
        // Adaptive arc depth based on distance between nodes
        const dist = Math.abs(src.x - tgt.x);
        const arcDepth = Math.max(30, dist * 0.25);
        const arcY = phaseY[s.phase] + laneH + arcDepth;
        path.attr('d', `M${src.x},${src.y} C${src.x},${arcY} ${tgt.x},${arcY} ${tgt.x},${tgt.y}`);
        labelX = (src.x + tgt.x) / 2;
        labelY = arcY + 16;
      } else if (isCrossPhase) {
        const src = getAnchor(s, 'bottom');
        const tgt = getAnchor(t, 'top');
        const sPhaseIdx = phases.findIndex(p => p.id === s.phase);
        const tPhaseIdx = phases.findIndex(p => p.id === t.phase);

        if (Math.abs(tPhaseIdx - sPhaseIdx) === 1 && Math.abs(s.px - t.px) < gapX * 0.5) {
          // Smooth vertical curve instead of straight line
          const midY = (src.y + tgt.y) / 2;
          path.attr('d', `M${src.x},${src.y} C${src.x},${midY} ${tgt.x},${midY} ${tgt.x},${tgt.y}`);
        } else {
          // Smooth stepped path with adaptive corner radius
          const hDist = Math.abs(tgt.x - src.x);
          const r = Math.min(24, hDist * 0.15, 30);
          const midY = (phaseY[s.phase] + laneH + phaseY[t.phase]) / 2;
          const dir = tgt.x > src.x ? 1 : -1;
          path.attr('d', [
            `M${src.x},${src.y}`,
            `L${src.x},${midY - r}`,
            `Q${src.x},${midY} ${src.x + dir * r},${midY}`,
            `L${tgt.x - dir * r},${midY}`,
            `Q${tgt.x},${midY} ${tgt.x},${midY + r}`,
            `L${tgt.x},${tgt.y}`
          ].join(' '));
        }
        labelX = (src.x + tgt.x) / 2;
        labelY = (src.y + tgt.y) / 2 - 8;
      } else {
        // Forward edge — subtle curve instead of straight line
        const src = getAnchor(s, 'right');
        const tgt = getAnchor(t, 'left');
        const midX = (src.x + tgt.x) / 2;
        const curveOffset = -8; // slight upward arc
        path.attr('d', `M${src.x},${src.y} Q${midX},${src.y + curveOffset} ${tgt.x},${tgt.y}`);
        labelX = midX;
        labelY = (src.y + tgt.y) / 2 - 14;
      }

      if (e.label) {
        edgeG.append('text')
          .attr('x', labelX).attr('y', labelY)
          .attr('text-anchor', 'middle')
          .attr('font-size', 11)
          .attr('font-weight', 600)
          .attr('font-family', 'var(--font-mono)')
          .attr('fill', '#E2E8F0')
          .text(e.label);
      }
    });

    // ── Nodes ──
    const nodeG = g.selectAll('.lc-node')
      .data(nodes)
      .join('g')
      .attr('class', 'lc-node')
      .attr('transform', d => `translate(${d.px - stepW/2},${d.py - stepH/2})`)
      .attr('cursor', 'pointer');

    nodeG.each(function(d) {
      const el = d3.select(this);
      if (d.shape === 'diamond') {
        el.append('rect')
          .attr('x', stepW/2 - 30).attr('y', stepH/2 - 30)
          .attr('width', 60).attr('height', 60)
          .attr('transform', `rotate(45, ${stepW/2}, ${stepH/2})`)
          .attr('fill', Shared.color(d.category))
          .attr('rx', 4)
          .attr('opacity', 0.9);
      } else {
        el.append('rect')
          .attr('width', stepW).attr('height', stepH)
          .attr('rx', 8)
          .attr('fill', Shared.color(d.category))
          .attr('opacity', 0.85);
      }

      // Multi-line label support
      const lines = d.name.split('\n');
      const lineH = 13;
      const textY = stepH / 2 - ((lines.length - 1) * lineH) / 2;
      lines.forEach((line, i) => {
        el.append('text')
          .attr('x', stepW / 2).attr('y', textY + i * lineH)
          .attr('text-anchor', 'middle')
          .attr('dominant-baseline', 'central')
          .attr('fill', '#fff')
          .attr('font-size', d.shape === 'diamond' ? 10 : 11)
          .attr('font-weight', 500)
          .text(line);
      });
    });

    // Interactivity
    nodeG
      .on('mouseover', (e, d) => {
        const desc = d.description + (toolMap[d.id] ? '\n\nTools: ' + toolMap[d.id].join(', ') : '');
        tooltip.show({ ...d, description: desc }, e);
      })
      .on('mousemove', (e, d) => {
        const desc = d.description + (toolMap[d.id] ? '\n\nTools: ' + toolMap[d.id].join(', ') : '');
        tooltip.show({ ...d, description: desc }, e);
      })
      .on('mouseout', () => tooltip.hide())
      .on('click', (e, d) => {
        const tools = toolMap[d.id] || [];
        sidebar.show(
          { ...d, description: d.description + (tools.length ? '\n\nActive tools:\n' + tools.map(t => '• ' + t).join('\n') : '') },
          edges.map(e => ({ source: e.source, target: e.target })),
          nodes
        );
      });

    svg.on('click', (e) => {
      if (e.target === svg.node()) sidebar.close();
    });

    // ── Legend ──
    Shared.createLegend([
      { key: 'process', label: 'Process Step' },
      { key: 'decision', label: 'Decision Point' },
    ]);
  })();
  </script>
</body>
</html>
