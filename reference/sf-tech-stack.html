<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Tech Stack Architecture — Claude Toolkit</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="controls">
    <button id="btn-reset">Reset Zoom</button>
    <input type="text" id="search" placeholder="Search nodes...">
  </div>

  <div class="title-bar">
    <h1>SF Tech Stack Architecture</h1>
    <div class="subtitle">Claude Code Hub &amp; Spoke — Salesforce Consulting Tools &amp; Integrations</div>
  </div>

  <a class="back-link" href="index.html">&larr; All Diagrams</a>

  <div class="filter-bar" id="filter-bar"></div>

  <svg class="diagram" id="svg"></svg>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="shared.js"></script>
  <script src="data/sf-tech-stack-data.js"></script>
  <script>
  (() => {
    const { nodes, edges, categories } = SFTechStackData;
    const width = window.innerWidth;
    const height = window.innerHeight;

    // Add sf-platform and skill colors to Shared since they're new
    const COLOR_EXT = {
      'sf-platform': '#0EA5E9',
      'skill':       '#D97706',
    };
    const colorFn = (cat) => COLOR_EXT[cat] || Shared.color(cat);

    const svg = d3.select('#svg');
    const g = svg.append('g');

    // ── Zoom ──
    const zoom = Shared.setupZoom(svg, g);
    svg.call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.85));

    document.getElementById('btn-reset').onclick = () => Shared.resetZoom(svg, zoom, width, height);

    // ── Tooltip & Sidebar ──
    const tooltip = Shared.createTooltip();
    const sidebar = Shared.createSidebar();

    // ── Hulls ──
    const hullG = g.append('g').attr('class', 'hulls');
    function updateHulls() {
      const groups = {};
      nodes.forEach(n => {
        if (n.category === 'hub') return;
        if (!groups[n.category]) groups[n.category] = [];
        groups[n.category].push([n.x, n.y]);
      });
      const hulls = Object.entries(groups)
        .filter(([, pts]) => pts.length >= 3)
        .map(([cat, pts]) => {
          const padded = [];
          pts.forEach(p => {
            padded.push([p[0]-30, p[1]-30], [p[0]+30, p[1]+30],
                        [p[0]-30, p[1]+30], [p[0]+30, p[1]-30]);
          });
          return { category: cat, hull: d3.polygonHull(padded) };
        })
        .filter(h => h.hull);

      hullG.selectAll('.hull')
        .data(hulls, d => d.category)
        .join('path')
        .attr('class', 'hull')
        .attr('d', d => 'M' + d.hull.join('L') + 'Z')
        .attr('fill', d => colorFn(d.category))
        .attr('fill-opacity', 0.06)
        .attr('stroke', d => colorFn(d.category))
        .attr('stroke-opacity', 0.15)
        .attr('stroke-width', 1);
    }

    // ── Arrow marker ──
    const defs = svg.append('defs');
    Shared.createArrowMarker(defs, 'arrow', '#64748B', { refX: 18, size: 7 });

    // ── Edges ──
    const edgeEls = Shared.drawEdges(g, edges)
      .attr('marker-end', 'url(#arrow)');

    // ── Radial positioning ──
    const catOrder = categories.map(c => c.key).filter(k => k !== 'hub');
    const catAngle = {};
    catOrder.forEach((k, i) => { catAngle[k] = (i / catOrder.length) * 2 * Math.PI - Math.PI / 2; });

    const radiusMap = {
      'mcp': 200,
      'skill': 280,
      'plugin': 280,
      'sf-platform': 400,
      'external': 480,
    };

    // ── Force Simulation ──
    const simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(edges).id(d => d.id).distance(d => {
        const src = typeof d.source === 'object' ? d.source : nodes.find(n => n.id === d.source);
        return src && src.category === 'hub' ? 160 : 70;
      }).strength(0.3))
      .force('charge', d3.forceManyBody().strength(-100))
      .force('radial', d3.forceRadial(d => {
        if (d.category === 'hub') return 0;
        return radiusMap[d.category] || 300;
      }, 0, 0).strength(d => d.category === 'hub' ? 1 : 0.6))
      .force('x', d3.forceX(d => {
        if (d.category === 'hub') return 0;
        const a = catAngle[d.category] || 0;
        return Math.cos(a) * (radiusMap[d.category] || 300) * 0.5;
      }).strength(0.15))
      .force('y', d3.forceY(d => {
        if (d.category === 'hub') return 0;
        const a = catAngle[d.category] || 0;
        return Math.sin(a) * (radiusMap[d.category] || 300) * 0.5;
      }).strength(0.15))
      .force('collision', d3.forceCollide(d => d.category === 'hub' ? 40 : 22));

    // Fix hub at center
    const hub = nodes.find(n => n.category === 'hub');
    if (hub) { hub.fx = 0; hub.fy = 0; }

    // ── Nodes ──
    const nodeEls = g.selectAll('.node')
      .data(nodes, d => d.id)
      .join('g')
      .attr('class', 'node')
      .attr('cursor', 'pointer');

    nodeEls.append('circle')
      .attr('r', d => d.category === 'hub' ? 30 : 14)
      .attr('fill', d => colorFn(d.category))
      .attr('stroke', d => d3.color(colorFn(d.category)).brighter(0.6))
      .attr('stroke-width', d => d.category === 'hub' ? 3 : 1.5);

    nodeEls.append('text')
      .attr('class', 'node-label')
      .attr('dy', d => (d.category === 'hub' ? 30 : 14) + 14)
      .text(d => d.name || d.id);

    // Drag
    nodeEls.call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); if (d.category !== 'hub') { d.fx = null; d.fy = null; } })
    );

    // Interactivity
    nodeEls
      .on('mouseover', (e, d) => tooltip.show(d, e))
      .on('mousemove', (e, d) => tooltip.show(d, e))
      .on('mouseout', () => tooltip.hide())
      .on('click', (e, d) => {
        sidebar.show(d, edges, nodes);
        Shared.highlightConnections(d.id, nodeEls, edgeEls, edges);
      });

    svg.on('click', (e) => {
      if (e.target === svg.node()) {
        sidebar.close();
        Shared.clearHighlight(nodeEls, edgeEls);
      }
    });

    // ── Tick ──
    simulation.on('tick', () => {
      edgeEls.attr('d', (d, i) => {
        const sx = d.source.x, sy = d.source.y;
        const tx = d.target.x, ty = d.target.y;
        // Alternate curve direction for visual separation
        const sign = i % 2 === 0 ? 1 : -1;
        const offset = 18 + (i % 3) * 6;
        return Shared.curvedEdgePath(sx, sy, tx, ty, offset * sign);
      });
      nodeEls.attr('transform', d => `translate(${d.x},${d.y})`);
      updateHulls();
    });

    // ── Legend ──
    const legendCats = categories.map(c => ({
      key: c.key,
      label: c.label
    }));
    const activeFilters = new Set(categories.map(c => c.key));

    // Create legend with color override
    const legendEl = document.createElement('div');
    legendEl.className = 'legend';
    legendCats.forEach(cat => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.dataset.category = cat.key;
      item.innerHTML = `<span class="legend-swatch" style="background:${colorFn(cat.key)}"></span>${cat.label}`;
      item.onclick = () => {
        if (activeFilters.has(cat.key)) { activeFilters.delete(cat.key); item.classList.add('dimmed'); }
        else { activeFilters.add(cat.key); item.classList.remove('dimmed'); }
        nodeEls.style('display', d => activeFilters.has(d.category) ? null : 'none');
        edgeEls.style('display', d => {
          const s = typeof d.source === 'object' ? d.source : nodes.find(n => n.id === d.source);
          const t = typeof d.target === 'object' ? d.target : nodes.find(n => n.id === d.target);
          return (activeFilters.has(s.category) && activeFilters.has(t.category)) ? null : 'none';
        });
      };
      legendEl.appendChild(item);
    });
    document.body.appendChild(legendEl);

    // ── Filter Buttons ──
    const filterBar = document.getElementById('filter-bar');
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn active';
      btn.style.background = colorFn(cat.key);
      btn.textContent = cat.label;
      btn.onclick = () => {
        const onlyThis = activeFilters.size === 2 && activeFilters.has(cat.key) && activeFilters.has('hub');
        if (onlyThis) {
          categories.forEach(c => activeFilters.add(c.key));
        } else {
          activeFilters.clear();
          activeFilters.add('hub');
          activeFilters.add(cat.key);
        }
        nodeEls.style('display', d => activeFilters.has(d.category) ? null : 'none');
        edgeEls.style('display', d => {
          const s = typeof d.source === 'object' ? d.source : nodes.find(n => n.id === d.source);
          const t = typeof d.target === 'object' ? d.target : nodes.find(n => n.id === d.target);
          return (activeFilters.has(s.category) && activeFilters.has(t.category)) ? null : 'none';
        });
        filterBar.querySelectorAll('.filter-btn').forEach(b => {
          b.classList.toggle('dimmed', !activeFilters.has(
            categories.find(c => c.label === b.textContent)?.key
          ));
        });
        legendEl.querySelectorAll('.legend-item').forEach(li => {
          li.classList.toggle('dimmed', !activeFilters.has(li.dataset.category));
        });
      };
      filterBar.appendChild(btn);
    });

    // ── Search ──
    Shared.setupSearch(document.getElementById('search'), nodes, (matches) => {
      if (!matches) {
        Shared.clearHighlight(nodeEls, edgeEls);
        return;
      }
      const ids = new Set(matches.map(m => m.id));
      nodeEls.style('opacity', d => ids.has(d.id) ? 1 : 0.1);
      edgeEls.style('opacity', 0.05);
    });
  })();
  </script>
</body>
</html>
