<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Dev Loop — Claude Toolkit</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="controls">
    <button id="btn-reset">Reset Zoom</button>
    <button id="btn-toggle">Show Details</button>
  </div>

  <div class="title-bar">
    <h1>SF Dev Loop</h1>
    <div class="subtitle">Salesforce Iterative Development Cycle with Screenshot Sub-Loop</div>
  </div>

  <a class="back-link" href="index.html">&larr; All Diagrams</a>

  <svg class="diagram" id="svg"></svg>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="shared.js"></script>
  <script src="data/sf-devloop-data.js"></script>
  <script>
  (() => {
    const { steps, edges, toolMap } = SFDevLoopData;
    const width = window.innerWidth;
    const height = window.innerHeight;
    const cx = 0, cy = 0;
    const outerR = Math.min(width, height) * 0.32;
    const innerR = outerR * 0.5;

    const svg = d3.select('#svg');
    const g = svg.append('g');

    const zoom = Shared.setupZoom(svg, g);
    svg.call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.9));
    document.getElementById('btn-reset').onclick = () => {
      svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.9));
    };

    const tooltip = Shared.createTooltip();
    const sidebar = Shared.createSidebar();

    // Arrow markers — consistent sizing
    const defs = svg.append('defs');
    Shared.createArrowMarker(defs, 'arrow', '#94A3B8', { refX: 12, size: 8 });
    Shared.createArrowMarker(defs, 'arrow-sub', '#EAB308', { refX: 12, size: 8 });
    Shared.createArrowMarker(defs, 'arrow-fail', '#F87171', { refX: 12, size: 8 });

    // ── Position steps on outer ring ──
    const n = steps.length;
    steps.forEach((s, i) => {
      const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
      s.angle = angle;
      s.x = cx + outerR * Math.cos(angle);
      s.y = cy + outerR * Math.sin(angle);
    });

    const stepMap = {};
    steps.forEach(s => { stepMap[s.id] = s; });

    // ── Outer ring arc ──
    g.append('circle')
      .attr('cx', cx).attr('cy', cy).attr('r', outerR)
      .attr('fill', 'none')
      .attr('stroke', '#1E293B')
      .attr('stroke-width', 40)
      .attr('opacity', 0.5);

    // ── Sub-loop ring ──
    g.append('circle')
      .attr('cx', cx).attr('cy', cy).attr('r', innerR)
      .attr('fill', 'none')
      .attr('stroke', '#EAB308')
      .attr('stroke-width', 2)
      .attr('stroke-dasharray', '6 4')
      .attr('opacity', 0.5);

    g.append('text')
      .attr('x', cx).attr('y', cy - innerR + 20)
      .attr('text-anchor', 'middle')
      .attr('font-size', 11)
      .attr('font-family', 'var(--font-mono)')
      .attr('fill', '#CA8A04')
      .attr('opacity', 0.6)
      .text('Screenshot Sub-Loop');

    // ── Edges ──
    const edgeG = g.append('g');
    edges.forEach(e => {
      const s = stepMap[e.source];
      const t = stepMap[e.target];
      if (!s || !t) return;

      const isSubLoop = (s.subloop && t.subloop) || (e.source === 'iterate' && e.target === 'screenshot');
      const isBackToStart = e.source === 'verify' && e.target === 'work-item';
      const isCIFail = e.source === 'ci-validate' && e.target === 'build';

      let path;
      if (isSubLoop) {
        // Sub-loop: curve inward toward inner ring, offset each edge slightly
        const midAngle = (s.angle + t.angle) / 2;
        // Prevent control point from jumping when angles wrap around
        const angleDiff = t.angle - s.angle;
        const adjustedMid = angleDiff > Math.PI ? midAngle + Math.PI :
                           angleDiff < -Math.PI ? midAngle - Math.PI : midAngle;
        const smx = cx + innerR * 0.55 * Math.cos(adjustedMid);
        const smy = cy + innerR * 0.55 * Math.sin(adjustedMid);
        path = edgeG.append('path')
          .attr('d', `M${s.x},${s.y} Q${smx},${smy} ${t.x},${t.y}`)
          .attr('class', 'edge edge-animated')
          .attr('stroke', '#EAB308')
          .attr('stroke-width', 2)
          .attr('opacity', 0.75)
          .attr('marker-end', 'url(#arrow-sub)');
      } else if (isBackToStart) {
        // Back-to-start: smooth curve through center area, offset from center
        const midAngle = (s.angle + t.angle) / 2 + Math.PI;
        const ctrlR = outerR * 0.2;
        const ctrlX = cx + ctrlR * Math.cos(midAngle);
        const ctrlY = cy + ctrlR * Math.sin(midAngle);
        path = edgeG.append('path')
          .attr('d', `M${s.x},${s.y} Q${ctrlX},${ctrlY} ${t.x},${t.y}`)
          .attr('class', 'edge edge-animated')
          .attr('stroke', '#A78BFA')
          .attr('stroke-width', 2)
          .attr('opacity', 0.7)
          .attr('stroke-dasharray', '8 4')
          .attr('marker-end', 'url(#arrow)');
      } else if (isCIFail) {
        // CI failure: curve inward through inner area
        const midAngle = (s.angle + t.angle) / 2;
        const mx = cx + innerR * 0.35 * Math.cos(midAngle);
        const my = cy + innerR * 0.35 * Math.sin(midAngle);
        path = edgeG.append('path')
          .attr('d', `M${s.x},${s.y} Q${mx},${my} ${t.x},${t.y}`)
          .attr('class', 'edge edge-animated')
          .attr('stroke', '#F87171')
          .attr('stroke-width', 2)
          .attr('opacity', 0.7)
          .attr('stroke-dasharray', '8 4')
          .attr('marker-end', 'url(#arrow-fail)');
      } else {
        // Forward edges: curve along the outer ring arc instead of straight line
        const midAngle = (s.angle + t.angle) / 2;
        const arcR = outerR * 1.12; // slightly outside the ring for visual separation
        const mx = cx + arcR * Math.cos(midAngle);
        const my = cy + arcR * Math.sin(midAngle);
        path = edgeG.append('path')
          .attr('d', `M${s.x},${s.y} Q${mx},${my} ${t.x},${t.y}`)
          .attr('class', 'edge edge-animated')
          .attr('stroke', d3.color(Shared.color(t.category)).brighter(0.3))
          .attr('stroke-width', 2)
          .attr('opacity', 0.65)
          .attr('marker-end', 'url(#arrow)');
      }

      // Edge label
      if (e.label) {
        const mx = (s.x + t.x) / 2;
        const my = (s.y + t.y) / 2;
        edgeG.append('text')
          .attr('x', mx).attr('y', my - 10)
          .attr('text-anchor', 'middle')
          .attr('font-size', 9)
          .attr('font-family', 'var(--font-mono)')
          .attr('fill', '#CBD5E1')
          .text(e.label);
      }
    });

    // ── Step Nodes ──
    const nodeR = 26;
    const nodeG = g.selectAll('.dl-node')
      .data(steps)
      .join('g')
      .attr('class', 'dl-node')
      .attr('transform', d => `translate(${d.x},${d.y})`)
      .attr('cursor', 'pointer');

    nodeG.append('circle')
      .attr('r', nodeR)
      .attr('fill', d => Shared.color(d.category))
      .attr('stroke', d => d.subloop ? '#CA8A04' : d3.color(Shared.color(d.category)).brighter(0.5))
      .attr('stroke-width', d => d.subloop ? 2.5 : 1.5);

    // Step number
    nodeG.append('text')
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'central')
      .attr('fill', '#fff')
      .attr('font-size', 13)
      .attr('font-weight', 700)
      .text(d => d.order + 1);

    // Label outside
    nodeG.append('text')
      .attr('class', 'node-label')
      .attr('y', nodeR + 16)
      .attr('font-size', 11)
      .text(d => d.name);

    // ── Detail mode: tool labels ──
    let detailMode = false;
    const toolLabels = nodeG.append('text')
      .attr('class', 'node-label node-label-mono')
      .attr('y', nodeR + 30)
      .attr('font-size', 9)
      .attr('fill', '#64748B')
      .attr('opacity', 0)
      .text(d => {
        const tools = toolMap[d.id];
        return tools ? tools.slice(0, 2).join(', ') : '';
      });

    document.getElementById('btn-toggle').onclick = function() {
      detailMode = !detailMode;
      this.textContent = detailMode ? 'Hide Details' : 'Show Details';
      toolLabels.transition().duration(300).attr('opacity', detailMode ? 1 : 0);
    };

    // Interactivity
    nodeG
      .on('mouseover', (e, d) => {
        const tools = toolMap[d.id] || [];
        tooltip.show({ ...d, description: d.description + (tools.length ? '\n\nTools: ' + tools.join(', ') : '') }, e);
      })
      .on('mousemove', (e, d) => {
        const tools = toolMap[d.id] || [];
        tooltip.show({ ...d, description: d.description + (tools.length ? '\n\nTools: ' + tools.join(', ') : '') }, e);
      })
      .on('mouseout', () => tooltip.hide())
      .on('click', (e, d) => {
        const tools = toolMap[d.id] || [];
        sidebar.show(
          { ...d, description: d.description + (tools.length ? '\n\nActive tools:\n' + tools.map(t => '• ' + t).join('\n') : '') },
          edges.map(e => ({ source: e.source, target: e.target })),
          steps
        );
      });

    svg.on('click', (e) => {
      if (e.target === svg.node()) sidebar.close();
    });

    // ── Center label ──
    g.append('text')
      .attr('x', cx).attr('y', cy + 4)
      .attr('text-anchor', 'middle')
      .attr('font-size', 14)
      .attr('font-weight', 600)
      .attr('fill', '#64748B')
      .text('SF Dev Cycle');

    // ── Legend ──
    Shared.createLegend([
      { key: 'process', label: 'Process Step' },
      { key: 'decision', label: 'Decision Point' },
    ]);
  })();
  </script>
</body>
</html>
